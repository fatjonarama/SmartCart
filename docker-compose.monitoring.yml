version: "3.8"

services:

  # ── PROMETHEUS ─────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: smartcart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-config.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - monitoring

  # ── GRAFANA ────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: smartcart-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  # ── LOKI (Log Aggregation) ─────────────────────
  loki:
    image: grafana/loki:latest
    container_name: smartcart-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - monitoring

  # ── PROMTAIL (Log Shipper) ─────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: smartcart-promtail
    volumes:
      - ./logs:/var/log/smartcart
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - monitoring

  # ── ELASTICSEARCH ──────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: smartcart-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - monitoring

  # ── KIBANA ─────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: smartcart-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  grafana-data:
  loki-data:
  elasticsearch-data:

networks:
  monitoring:
    driver: bridge