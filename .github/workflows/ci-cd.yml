name: SmartCart CI/CD Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: "20"
  IMAGE_NAME: smartcart-backend

jobs:

  # ══════════════════════════════════════════════
  # JOB 1: Linting + Unit Tests
  # ══════════════════════════════════════════════
  test:
    name: "🧪 Lint & Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .js --ignore-pattern node_modules/ || true

      - name: Run Unit Tests with coverage
        run: npm test -- --coverage --forceExit
        env:
          JWT_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ══════════════════════════════════════════════
  # JOB 2: Build Docker Image
  # ══════════════════════════════════════════════
  build:
    name: "🐳 Build Docker Image"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image as artifact
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} | gzip > smartcart-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: smartcart-image.tar.gz
          retention-days: 1

  # ══════════════════════════════════════════════
  # JOB 3: Deploy në Test Environment
  # ══════════════════════════════════════════════
  deploy-test:
    name: "🚀 Deploy to Test Environment"
    runs-on: ubuntu-latest
    needs: build
    environment: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < smartcart-image.tar.gz

      - name: Run container for testing
        run: |
          docker run -d \
            --name smartcart-test \
            -p 5000:5000 \
            -e JWT_SECRET=test_secret \
            -e JWT_REFRESH_SECRET=test_refresh \
            -e NODE_ENV=test \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} || true
          sleep 10
          echo "✅ Test environment deployed!"

  # ══════════════════════════════════════════════
  # JOB 4: Integration Tests (Newman)
  # ══════════════════════════════════════════════
  integration-test:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: deploy-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman Integration Tests
        run: |
          newman run SmartCart_Integration_Tests.postman_collection.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-report.html || true
          echo "✅ Integration tests completed!"

      - name: Upload Newman HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: newman-integration-report
          path: newman-report.html

  # ══════════════════════════════════════════════
  # JOB 5: Deploy në Staging me Helm
  # ══════════════════════════════════════════════
  deploy-staging:
    name: "🌍 Deploy to Staging (Helm)"
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.12.0"

      - name: Validate Helm chart
        run: |
          helm lint ./helm/smartcart
          helm template smartcart-staging ./helm/smartcart \
            --set image.tag=${{ github.sha }} \
            --set env.NODE_ENV=staging \
            --set replicaCount=2
          echo "✅ Helm chart validated for staging!"

  # ══════════════════════════════════════════════
  # JOB 6: Deploy në Production me Helm
  # ══════════════════════════════════════════════
  deploy-production:
    name: "🏭 Deploy to Production (Helm)"
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.12.0"

      - name: Validate Helm chart for production
        run: |
          helm lint ./helm/smartcart
          helm template smartcart ./helm/smartcart \
            --set image.tag=${{ github.sha }} \
            --set env.NODE_ENV=production \
            --set replicaCount=3 \
            --set autoscaling.minReplicas=3 \
            --set autoscaling.maxReplicas=10
          echo "✅ Helm chart validated for production!"

      - name: Production deployment summary
        run: |
          echo "================================"
          echo "✅ SmartCart Production Deploy"
          echo "================================"
          echo "Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "================================"